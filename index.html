<!DOCTYPE html>
<html>
<head>
  <title>Private Gaming Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    h1 {
      color: #00ffcc;
      margin-top: 20px;
    }

    .section {
      margin-top: 30px;
    }

    .card {
      background: #1c1c1c;
      margin: 15px;
      padding: 20px;
      border-radius: 12px;
      display: inline-block;
      width: 220px;
    }

    button {
      padding: 10px;
      background: #00ffcc;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
    }

    button:hover {
      background: #00c2a3;
    }
  </style>
</head>

<body>

<h1>🎮 Private Gaming Hub</h1>
<p>Instant Play Server System</p>

<div class="section">
  <h2>🟢 Live Games</h2>

  <div class="card">
    <h3>Minecraft</h3>
    <p>Join Live Server</p>
    <button onclick="alert('Minecraft Server Coming Soon')">Play</button>
  </div>
</div>

<div class="section">
  <h2>🟡 Browser Games</h2>

  <div class="card">
    <h3>Mini Racing</h3>
    <p>Instant Play</p>
    <button onclick="alert('Game Loading...')">Play</button>
  </div>

  <div class="card">
    <h3>Battle Arena</h3>
    <p>Multiplayer</p>
    <button onclick="alert('Game Loading...')">Play</button>
  </div>

</div>

</body>
</html>
